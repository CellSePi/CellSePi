site_name: CellSePi
site_description: Documentation for building modules in the CellSePi pipeline system.
site_url: https://cellsepi.github.io/CellSePi/
repo_url: https://github.com/CellSePi/CellSePi
repo_name: CellSePi
docs_dir: docs

theme:
  name: material
  logo: https://raw.githubusercontent.com/CellSePi/CellSePi/main/cellsepi/assets/icon.png
  favicon: https://raw.githubusercontent.com/CellSePi/CellSePi/main/cellsepi/assets/icon.png
  palette:
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.sticky
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - include-markdown
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["cellsepi"]
          options:
            docstring_style: google
            show_source: false
            show_root_toc_entry: true
            show_category_heading: true
            members_order: source

markdown_extensions:
  - pymdownx.snippets
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Quick start: guide/quickstart.md
  - Guide:
      - Subclass Module: guide/subclass.md
      - Declare ports: guide/ports.md
      - Define settings: guide/settings.md
      - Implement run(): guide/run.md
      - Launch the plugin: guide/plugin.md
  - Examples: guide/examples.md

