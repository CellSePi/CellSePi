name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/guide/**'
      - 'docs/index.md'
      - 'docs/stylesheets/**'
      - 'docs/javascripts/**'
      - 'docs/examples/**'
      - 'docs/assets/**'
      - 'mkdocs.yml'
      - 'cellsepi/backend/expert_mode/module.py'
      - 'cellsepi/backend/expert_mode/ports.py'
      - 'cellsepi/backend/expert_mode/limits.py'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install mkdocs-material mkdocstrings[python] mkdocs-include-markdown-plugin

      - name: Deploy
        run: mkdocs gh-deploy --force --remote-branch gh-pages