name: Build Flet App

on:
  push:
    tags:
      - "v*"

env:
  UV_PYTHON: 3.12
  PYTHONUTF8: 1

  # https://flet.dev/docs/reference/environment-variables
  FLET_CLI_NO_RICH_OUTPUT: 1

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # -------- Desktop --------
          - name: linux-cpu
            runner: ubuntu-latest
            artifact_path: build/linux
            needs_linux_deps: true
            is_gpu: false
            archive_type: gztar

          - name: linux-gpu
            runner: ubuntu-latest
            artifact_path: build/linux
            needs_linux_deps: true
            is_gpu: true
            archive_type: xztar

          - name: macos
            runner: macos-latest
            artifact_path: build/macos
            needs_linux_deps: false
            is_gpu: false
            archive_type: gztar

          - name: windows
            runner: windows-latest
            artifact_path: build/windows
            needs_linux_deps: false
            is_gpu: true
            archive_type: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux dependencies
        if: matrix.needs_linux_deps
        shell: bash
        run: |
            sudo apt update --allow-releaseinfo-change
            sudo apt-get install -y --no-install-recommends \
              clang ninja-build libgtk-3-dev libasound2-dev libmpv-dev mpv \
              libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
              gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
              gstreamer1.0-libav gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 \
              gstreamer1.0-qt5 gstreamer1.0-pulseaudio pkg-config libsecret-1-0 libsecret-1-dev
            sudo apt-get clean

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry poetry-plugin-export

      - name: Install dependencies
        run: poetry install --only main

      - name: Export & Prune TOML for CPU
        shell: bash
        run: |
          poetry export -f requirements.txt --output requirements.txt --without-hashes
          
          sed '/triton/d' requirements.txt > tmp.txt && mv tmp.txt requirements.txt
          
          if [ "${{ matrix.is_gpu }}" == "false" ]; then
            echo "Building CPU-only version..."
            sed '/nvidia/d' requirements.txt > tmp.txt && mv tmp.txt requirements.txt
            echo "--extra-index-url https://download.pytorch.org/whl/cpu" > cpu_reqs.txt
            cat requirements.txt >> cpu_reqs.txt
            mv cpu_reqs.txt requirements.txt
            
            python3 -c '
import os
with open("pyproject.toml", "r") as f:
    lines = f.readlines()
new_lines = []
skip = False
for line in lines:
     if "[tool.poetry.dependencies]" in line or "[tool.poetry.group.dev.dependencies]" in line:
        skip = True
        continue
    if line.startswith("[") and skip:
       if "tool.poetry.dependencies" not in line and "tool.poetry.group" not in line:
            skip = False
    if not skip:
        new_lines.append(line)
with open("pyproject.toml", "w") as f:
    f.writelines(new_lines)
'  
            rm -rf .venv
          fi
          
      - name: Build app
        run: |
          pip install flet flet-cli
        
          python3 -m flet build ${{ runner.os == 'Linux' && 'linux' || matrix.name }} --yes --verbose
          
      - name: Archive build
        shell: python
        run: |
          import shutil
          import os

          matrix_name = "${{ matrix.name }}"
          base_path = "${{ matrix.artifact_path }}"
          archive_format = "${{ matrix.archive_type }}" 
          is_gpu = "${{ matrix.is_gpu }}" == "true"
          
          if "linux" in matrix_name:
              os_name = "linux"
          elif "macos" in matrix_name:
              os_name = "macos"
          else:
              os_name = "windows"
              
          hw_type = "-gpu" if is_gpu else ""
          
          final_name = f"cellsepi-{os_name}{hw_type}"
          
          shutil.make_archive(final_name, archive_format, base_path)
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: cellsepi-artifact-${{ matrix.name }}
          path: cellsepi-*.*
          if-no-files-found: error
          overwrite: false
          retention-days: 1
          
  release:
      name: Publish GitHub Release
      runs-on: ubuntu-latest
      needs: build
      if: startsWith(github.ref, 'refs/tags/')

      steps:
        - name: Download all build artifacts
          uses: actions/download-artifact@v5.0.0
          with:
            pattern: cellsepi-artifact-*
            path: dist
            merge-multiple: true

        - name: Create GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            name: ${{ github.ref_name }}
            tag_name: ${{ github.ref_name }}
            files: dist/*
            generate_release_notes: true
