name: Build Flet App

on:
  push:
    tags:
      - "v*"

env:
  UV_PYTHON: 3.12
  PYTHONUTF8: 1

  # https://flet.dev/docs/reference/environment-variables
  FLET_CLI_NO_RICH_OUTPUT: 1

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          cache-dependency-glob: ""

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # -------- Desktop --------
          - name: linux
            runner: ubuntu-22.04
            target: linux
            artifact_path: build/linux
            needs_linux_deps: true
            archive_type: xztar
            accelerator: cpu

          - name: linux-gpu
            runner: ubuntu-22.04
            target: linux
            artifact_path: build/linux
            needs_linux_deps: true
            archive_type: xztar
            accelerator: gpu

          - name: macos
            runner: macos-latest
            target: macos
            artifact_path: build/macos
            needs_linux_deps: false
            archive_type: gztar
            accelerator: cpu

          - name: windows
            runner: windows-latest
            target: windows
            artifact_path: build/windows
            needs_linux_deps: false
            archive_type: zip
            accelerator: cpu

          - name: windows-gpu
            runner: windows-latest
            target: windows
            artifact_path: build/windows
            needs_linux_deps: false
            archive_type: zip
            accelerator: gpu

    steps:
      - name: Free up runner disk space
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -a -f
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Long Paths on Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          cache-dependency-glob: ""

      - name: Build Backend Worker (PyInstaller)
        shell: bash
        run: |
          if [ "${{ matrix.target }}" == "linux" ]; then
            sudo apt-get update
            sudo apt-get install -y libffi-dev libssl-dev
          fi

          uv venv worker_build_env

          if [ "${{ matrix.target }}" == "windows" ]; then
            VENV_BIN="worker_build_env/Scripts"
          else
            VENV_BIN="worker_build_env/bin"
          fi

          uv pip install -p worker_build_env pyinstaller

          if [ "${{ matrix.target }}" == "windows" ]; then
            $VENV_BIN/pyinstaller --onefile --paths cellsepi --noconsole --distpath external_worker_build --clean cellsepi/backend/worker.py
          elif [ "${{ matrix.target }}" == "linux" ]; then
            $VENV_BIN/pyinstaller --onefile --paths cellsepi --hidden-import=ctypes --hidden-import=_ctypes --collect-binaries _ctypes --distpath external_worker_build --clean cellsepi/backend/worker.py
          else
            $VENV_BIN/pyinstaller --onefile --paths cellsepi --hidden-import=ssl --distpath external_worker_build --clean cellsepi/backend/worker.py
          fi
          
          ls -la external_worker_build/

      - name: Disable Windows Defender (Performance Boost)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cache"
          Add-MpPreference -ExclusionPath "C:\hostedtoolcache"

      - name: Install Linux dependencies
        if: matrix.needs_linux_deps
        shell: bash
        run: |
            sudo apt update --allow-releaseinfo-change
            sudo apt-get install -y --no-install-recommends \
              libunwind-dev \
              clang ninja-build libgtk-3-dev libasound2-dev libmpv-dev mpv \
              libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
              gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
              gstreamer1.0-libav gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 \
              gstreamer1.0-qt5 gstreamer1.0-pulseaudio pkg-config libsecret-1-0 libsecret-1-dev
            sudo apt-get clean

      - name: Extract Global App Variables
        shell: bash
        run: |
          APP_NAME=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['name'])")
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          
          VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          
          REF_NAME="${{ github.ref_name }}"
          
          if [[ "${{ github.ref_type }}" == "tag" ]] && [[ "$REF_NAME" == v* ]]; then
            EXTRACTED_VERSION="${REF_NAME#v}"
            
            if [[ "$EXTRACTED_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              VERSION="$EXTRACTED_VERSION"
            fi
          fi
          
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Patch pyproject.toml with Git Tag Version
        shell: bash
        run: |
          echo "Patching pyproject.toml to version: ${{ env.APP_VERSION }}"
          
          uv run python -c '
          import re
          import os
          
          new_version = os.environ.get("APP_VERSION")
          
          with open("pyproject.toml", "r", encoding="utf-8") as f:
              content = f.read()
              
          patched_content = re.sub(
              r"^version\s*=\s*\".*?\"", 
              f"version = \"{new_version}\"", 
              content, 
              flags=re.MULTILINE
          )
          
          with open("pyproject.toml", "w", encoding="utf-8") as f:
              f.write(patched_content)
          '

      - name: Install dependencies
        run: uv sync

      - name: Set Torch dependencies
        shell: bash
        run: |
          uv remove torch torchvision || true
          
          uv run python -c '
          import os
          os_target = "${{ matrix.target }}"
          accelerator = "${{ matrix.accelerator }}"
          
          if os_target == "macos":
              suffix = ""
          elif accelerator == "cpu":
              suffix = "+cpu"
          else:
              suffix = "+cu124"
              
          toml_append = f"""
          
          [tool.flet.{os_target}]
          dependencies = [
              "torch==2.6.0{suffix}",
              "torchvision==0.21.0{suffix}"
          ]
          """
          with open("pyproject.toml", "a") as f:
              f.write(toml_append)
              
          print(f"Set dependencies for {os_target} ({accelerator}):")
          print(toml_append)
          '

      - name: Build app
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          shell: bash
          command: |
            if [ "${{ matrix.target }}" == "macos" ]; then
              uv run flet build ${{ matrix.target }} --arch arm64 --template https://github.com/CellSePi/CellSePiTemplate --yes --verbose
            else
              if [ "${{ matrix.accelerator }}" == "cpu" ]; then
                export PIP_EXTRA_INDEX_URL="https://download.pytorch.org/whl/cpu"
                export UV_EXTRA_INDEX_URL="https://download.pytorch.org/whl/cpu"
              else
                export PIP_EXTRA_INDEX_URL="https://download.pytorch.org/whl/cu124"
                export UV_EXTRA_INDEX_URL="https://download.pytorch.org/whl/cu124"
              fi
              uv run flet build ${{ matrix.target }} --template https://github.com/CellSePi/CellSePiTemplate --yes --verbose
            fi

      - name: Inject Worker into App Folder & Clean Up
        shell: bash
        run: |
          if [ "${{ matrix.target }}" == "windows" ]; then
            cp external_worker_build/worker.exe ${{ matrix.artifact_path }}/
            
          elif [ "${{ matrix.target }}" == "macos" ]; then
            cp external_worker_build/worker ${{ matrix.artifact_path }}/*.app/Contents/MacOS/
            chmod +x ${{ matrix.artifact_path }}/*.app/Contents/MacOS/worker
            
          else
            cp external_worker_build/worker ${{ matrix.artifact_path }}/
            chmod +x ${{ matrix.artifact_path }}/worker
          fi
          
          rm -rf external_worker_build
          rm -rf worker_build_env

      - name: Setup Icon and install script for portable Linux archive
        if: matrix.target == 'linux'
        shell: bash
        run: |
          cp cellsepi/assets/icon.png ${{ matrix.artifact_path }}/icon.png
          
          eval $(uv run python -c '
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
              p = data["project"]
              fl = data["tool"]["flet"]
          
          print("export APP_DESC=\"{}\"".format(p["description"]))
          print("export APP_PRODUCT_NAME=\"{}\"".format(fl["product_name"]))
          ')
          
          cat <<EOF > ${{ matrix.artifact_path }}/${APP_NAME}.desktop
          [Desktop Entry]
          Version=1.1
          Type=Application
          Name=${APP_PRODUCT_NAME}
          Comment=${APP_DESC}
          Exec=./${APP_NAME}
          Icon=./icon.png
          Terminal=false
          Categories=Science;
          EOF
          
          cat <<EOF > ${{ matrix.artifact_path }}/install_desktop_icon.sh
          #!/bin/bash
          INSTALL_DIR="\$(cd "\$(dirname "\$0")" && pwd)"
          TARGET_DIR="\$HOME/.local/share/applications"
          mkdir -p "\$TARGET_DIR"
          
          sed "s|Exec=./|Exec=\$INSTALL_DIR/|g; s|Icon=./|Icon=\$INSTALL_DIR/|g" "\$INSTALL_DIR/${APP_NAME}.desktop" > "\$TARGET_DIR/${APP_NAME}.desktop"
          
          update-desktop-database "\$TARGET_DIR"
          echo "Successfully installed! The Icon is now available."
          EOF
          chmod +x ${{ matrix.artifact_path }}/install_desktop_icon.sh

      - name: Build Linux Packages (.deb, Arch & .rpm)
        if: matrix.target == 'linux' && matrix.accelerator == 'cpu'
        shell: bash
        run: |
          eval $(uv run python -c '
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
              p = data["project"] 
              fl = data["tool"]["flet"]
          
          print("export APP_DESC=\"{}\"".format(p["description"]))
          print("export APP_PRODUCT_NAME=\"{}\"".format(fl["product_name"]))
          ')
          
          cat <<EOF > ${APP_NAME}.desktop
          [Desktop Entry]
          Version=1.1
          Type=Application
          Name=${APP_PRODUCT_NAME}
          Comment=${APP_DESC}
          Exec=/usr/bin/${APP_NAME}
          Icon=/usr/share/pixmaps/${APP_NAME}.png
          Terminal=false
          Categories=Science;
          EOF
          
          wget -qO- https://github.com/goreleaser/nfpm/releases/download/v2.37.1/nfpm_2.37.1_Linux_x86_64.tar.gz | tar xz
          
          DEB_FILE="${APP_NAME}_${APP_VERSION}_amd64.deb"
          ./nfpm pkg --config nfpm.yaml --target $DEB_FILE
          
          ARCH_FILE="${APP_NAME}_${APP_VERSION}_amd64.pkg.tar.zst"
          ./nfpm pkg --config nfpm.yaml --target $ARCH_FILE -p archlinux
          
          RPM_FILE="${APP_NAME}_${APP_VERSION}_amd64.rpm"
          ./nfpm pkg --config nfpm.yaml --target $RPM_FILE -p rpm
          

      - name: Fix Windows Icon (rcedit)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile "rcedit.exe"
          
          $exePath = Get-ChildItem -Path "${{ matrix.artifact_path }}" -Filter "*.exe" | Select-Object -First 1
          
          if ($exePath) {
              Write-Host "Exe found: $($exePath.FullName)"
              
              $iconPath = "cellsepi/assets/icon_windows.ico" 
              
              if (Test-Path $iconPath) {
                  Write-Host "Icon-Data found: $iconPath"
                  
                  .\rcedit.exe $exePath.FullName --set-icon $iconPath
                  Write-Host "Icon successfully switched!"
              } else {
                  Write-Host "--- Current Directory ---"
                  Get-ChildItem | Select-Object Name
                  Write-Error "Icon-Data was not found: $iconPath"
              }
          } else {
              Write-Error "No .exe Data is found, in folder: ${{ matrix.artifact_path }}"
          }
          
      - name: Archive build
        shell: bash
        run: |
          OS_TARGET="${{ matrix.target }}"
          ACCELERATOR="${{ matrix.accelerator }}"
          MATRIX_NAME="${{ matrix.name }}"
          BASE_PATH="${{ matrix.artifact_path }}"
          ARCHIVE_FORMAT="${{ matrix.archive_type }}"
          
          if [ "$OS_TARGET" == "macos" ]; then
            FINAL_NAME="${APP_NAME}_${APP_VERSION}_macos_arm64"
          else
            FINAL_NAME="${APP_NAME}_${APP_VERSION}_${OS_TARGET}_${ACCELERATOR}_amd64"
          fi
          
          if [ "$ARCHIVE_FORMAT" == "xztar" ]; then
            export XZ_OPT="-T0"
            tar -cJf "${FINAL_NAME}.tar.xz" -C "$BASE_PATH" .
          elif [ "$ARCHIVE_FORMAT" == "gztar" ]; then
            tar -czf "${FINAL_NAME}.tar.gz" -C "$BASE_PATH" .  
          elif [ "$OS_TARGET" == "windows" ] && [ "$ARCHIVE_FORMAT" == "zip" ]; then
            ROOT_DIR=$(pwd)
            cd "$BASE_PATH"
            7z a -tzip -mx=5 "$ROOT_DIR/${FINAL_NAME}.zip" *
            cd "$ROOT_DIR"
          else
            uv run python -c "import shutil; shutil.make_archive('$FINAL_NAME', '$ARCHIVE_FORMAT', '$BASE_PATH')"
          fi

      - name: Auto-Split if > 2GB
        shell: bash
        run: |
          ARCHIVE_FILE=""
          for f in ${{ env.APP_NAME }}_*.zip ${{ env.APP_NAME }}_*.tar.gz ${{ env.APP_NAME }}_*.tar.xz; do
            if [ -f "$f" ]; then
              ARCHIVE_FILE="$f"
              break
            fi
          done
          
          if [ -z "$ARCHIVE_FILE" ]; then
            echo "No archive file found, skipping split."
            exit 0
          fi
          
          echo "Found archive to check: $ARCHIVE_FILE"
          
          FILE_SIZE=$(uv run python3 -c "import os; print(os.path.getsize('$ARCHIVE_FILE'))")
          MAX_SIZE=1900000000 

          if [ $FILE_SIZE -gt $MAX_SIZE ]; then
            echo "File is larger than 2GB, splitting now..."
            split -b 1500M "$ARCHIVE_FILE" "${ARCHIVE_FILE}.part"
            rm "$ARCHIVE_FILE"
          fi
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: ${{ env.APP_NAME }}-artifact-${{ matrix.name }}
          path: |
            ${{ env.APP_NAME }}_*.*
            *.deb
            *.rpm
            *.pkg.tar.zst
          if-no-files-found: error
          overwrite: false
          retention-days: 1
          
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5.0.0
        with:
          pattern: '*-artifact-*'
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true