[tool.flet.app]
path = "cellsepi"

[tool.poetry]
name = "cellsepi"
version = "1.1.9.9.4"
description = "Segmentation of microscopy images and data analysis pipeline with a graphical user interface, powered by Cellpose."
authors = ["Jenna Ahlvers", "Santosh Chhetri Thapa", "Nike Dratt", "Pascal Heß", "Florian Hock"]
license = "Apache-2.0"
homepage = "https://github.com/PraiseTheDarkFlo/CellSePi"
readme = "README.md"
packages = [
    { include = "cellsepi", from = "cellsepi" }
]

[tool.poetry.dependencies]
python = ">=3.11,<3.14"
numpy = "2.1.0"
scipy = "1.17.1"
pillow = "12.2.0"
pandas = "2.2.3"
openpyxl = "3.1.5"
cellpose = "4.1.1"
flet = "0.84.0"
flet-cli = "0.84.0"
flet-desktop = "0.84.0"
flet-color-pickers = "0.84.0"
flet-extended-interactive-viewer = "0.2.1"
bioio = "3.3.0"
bioio-lif = "1.4.2"
torchvision = "0.17.2"
jsonschema = "4.25.1"
cellsepi-drawing = { git = "https://github.com/CellSePi/CellSePiDrawing.git", branch = "master" }

[tool.poetry.group.dev.dependencies]
pytest = "8.3.4"

[tool.poetry.scripts]
cellsepi = "cellsepi.main:main"


[[tool.poetry.include]]
path = "cellsepi/models/**/*"
[[tool.poetry.include]]
path = "cellsepi/config.json"
[[tool.poetry.include]]
path = "cellsepi/csp.schema.json"
[[tool.poetry.include]]
path = "cellsepi/pyproject.toml"

[build-system]
requires = ["poetry-core>=1.3.0"]
build-backend = "poetry.core.masonry.api"
